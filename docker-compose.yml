version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: secure-postgres

    environment:
      POSTGRES_DB: securedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - ./init_data.sql:/docker-entrypoint-initdb.d/init.sql